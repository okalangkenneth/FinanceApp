# EXAMPLE ONLY — never commit real values.
# Create the real secret imperatively (values stay out of git):
#
#   kubectl -n financeapp create secret generic financeapp-secrets \
#     --from-literal=POSTGRES_USER=financeapp \
#     --from-literal=POSTGRES_PASSWORD=<choose a strong password> \
#     --from-literal=POSTGRES_DB=financeapp \
#     --from-literal=ConnectionStrings__DefaultConnection="Host=postgres;Port=5432;Database=financeapp;Username=financeapp;Password=<same password>" \
#     --from-literal=Anthropic__ApiKey=<your key or leave empty> \
#     --from-literal=SendGrid__ApiKey=<your key or leave empty> \
#     --from-literal=SendGrid__SenderEmail=<your verified sender or leave empty> \
#     --from-literal=SeedDemo__Password=<strong password meeting Identity policy>
#
# To update: kubectl -n financeapp create secret generic financeapp-secrets \
#              --dry-run=client -o yaml <flags> | kubectl apply -f -
# To delete:  kubectl -n financeapp delete secret financeapp-secrets

apiVersion: v1
kind: Secret
metadata:
  name: financeapp-secrets
  namespace: financeapp
type: Opaque
stringData:
  POSTGRES_USER: "<POSTGRES_USER>"
  POSTGRES_PASSWORD: "<POSTGRES_PASSWORD>"
  POSTGRES_DB: "<POSTGRES_DB>"
  ConnectionStrings__DefaultConnection: "<CONNECTION_STRING>"
  Anthropic__ApiKey: "<ANTHROPIC_API_KEY>"
  SendGrid__ApiKey: "<SENDGRID_API_KEY>"
  SendGrid__SenderEmail: "<SENDGRID_SENDER_EMAIL>"
  SeedDemo__Password: "<SEED_DEMO_PASSWORD>"
